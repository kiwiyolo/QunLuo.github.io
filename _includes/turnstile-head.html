<script>
  // ==========================================
  // CONFIGURATION: Set your Supabase Edge Function URL here

  // ==========================================
  const SUPABASE_FUNCTIONS_URL = "https://fracycwtkurcimbwcvjz.supabase.co/functions/v1";
  
  window.__ql_turnstile_token = null;
  function qlOnTurnstileSuccess(token) {
    window.__ql_turnstile_token = token;
    document.querySelectorAll(".ql-turnstile-token").forEach((el) => {
      el.value = token;
    });
  }

  function getDeviceId() {
    let id = localStorage.getItem("ql_device_id");
    if (!id) {
      id = "device_" + Math.random().toString(36).substring(2) + Date.now().toString(36);
      localStorage.setItem("ql_device_id", id);
    }
    return id;
  }

  function getPostSlug() {
    return window.location.pathname.replace(/^\/QunLuo\.github\.io\//, '').replace(/^\//, '').replace(/\.html$/, '');
  }
</script>
