<section class="ql-interactions" aria-label="Post interactions">
  <div class="ql-actions-bar">
    <button id="ql-like-btn" class="ql-action-btn" title="Like this post">
      <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="ql-icon-heart"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
      <span id="ql-like-count">0</span>
    </button>
    <button id="ql-share-btn" class="ql-action-btn" title="Copy link">
      <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>
      <span>Share</span>
    </button>
  </div>

  <div class="ql-comments-section">
    <h3>Comments</h3>
    <div id="ql-comments-list" class="ql-comments-list">
      <div class="ql-loading">Loading comments...</div>
    </div>

    <div class="ql-comment-form">
      <h4>Leave a reply</h4>
      <input type="text" id="ql-comment-name" placeholder="Name (optional, default: Anonymous)" maxlength="50">
      <textarea id="ql-comment-content" placeholder="What are your thoughts?" rows="3" required></textarea>
      
      <div class="ql-turnstile-box">
        <p class="ql-turnstile-desc">To protect anonymous submissions from spam, this site uses Cloudflare Turnstile.</p>
        <div class="cf-turnstile" data-sitekey="0x4AAAAAACzZJprJ4npD9l7W" data-callback="qlOnTurnstileSuccess"></div>
        <input class="ql-turnstile-token" type="hidden" name="captchaToken" value="">
      </div>

      <div class="ql-form-actions">
        <button id="ql-comment-submit" class="ql-btn-primary">Post Comment</button>
        <span id="ql-comment-status" class="ql-status-msg"></span>
      </div>
    </div>
  </div>
</section>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const postSlug = getPostSlug();
  const deviceId = getDeviceId();
  
  const likeBtn = document.getElementById("ql-like-btn");
  const likeCountEl = document.getElementById("ql-like-count");
  const shareBtn = document.getElementById("ql-share-btn");
  
  const commentsListEl = document.getElementById("ql-comments-list");
  const commentSubmitBtn = document.getElementById("ql-comment-submit");
  const commentNameEl = document.getElementById("ql-comment-name");
  const commentContentEl = document.getElementById("ql-comment-content");
  const commentStatusEl = document.getElementById("ql-comment-status");

  // 1. Share Button
  shareBtn.addEventListener("click", async () => {
    try {
      await navigator.clipboard.writeText(window.location.href);
      const originalText = shareBtn.querySelector("span").textContent;
      shareBtn.querySelector("span").textContent = "Copied!";
      setTimeout(() => shareBtn.querySelector("span").textContent = originalText, 2000);
    } catch (e) {
      console.error("Failed to copy", e);
    }
  });

  // 2. Load Likes (Optional: If you want to fetch initial like count without toggling, 
  // you might need a separate GET endpoint. For now, we rely on user interaction to toggle).
  // A proper implementation would fetch the initial count here.

  // 3. Toggle Like
  likeBtn.addEventListener("click", async () => {
    const token = window.__ql_turnstile_token;
    if (!token) {
      alert("Please complete the captcha first to like this post.");
      return;
    }
    likeBtn.disabled = true;
    try {
      const res = await fetch(`${SUPABASE_FUNCTIONS_URL}/like-toggle`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ postSlug, deviceId, captchaToken: token })
      });
      if (!res.ok) throw new Error("Failed to toggle like");
      const data = await res.json();
      if (data.ok) {
        likeCountEl.textContent = data.count;
        if (data.liked) {
          likeBtn.classList.add("ql-liked");
          likeBtn.querySelector("svg").setAttribute("fill", "currentColor");
        } else {
          likeBtn.classList.remove("ql-liked");
          likeBtn.querySelector("svg").setAttribute("fill", "none");
        }
      }
    } catch (err) {
      console.error(err);
      alert("Failed to toggle like. Please try again later.");
    } finally {
      likeBtn.disabled = false;
    }
  });

  // 4. Load Comments
  async function loadComments() {
    try {
      const res = await fetch(`${SUPABASE_FUNCTIONS_URL}/comments-list?postSlug=${encodeURIComponent(postSlug)}`);
      if (!res.ok) throw new Error("Failed to load comments");
      const data = await res.json();
      
      if (data.ok && data.comments) {
        if (data.comments.length === 0) {
          commentsListEl.innerHTML = '<div class="ql-empty">No comments yet. Be the first to share your thoughts!</div>';
        } else {
          commentsListEl.innerHTML = data.comments.map(c => `
            <div class="ql-comment-item">
              <div class="ql-comment-meta">
                <strong>${escapeHtml(c.nickname || "Anonymous")}</strong>
                <span>${new Date(c.created_at).toLocaleDateString()}</span>
              </div>
              <div class="ql-comment-text">${escapeHtml(c.content).replace(/\n/g, '<br>')}</div>
            </div>
          `).join("");
        }
      }
    } catch (err) {
      console.error(err);
      commentsListEl.innerHTML = '<div class="ql-error">Failed to load comments.</div>';
    }
  }

  // 5. Submit Comment
  commentSubmitBtn.addEventListener("click", async () => {
    const content = commentContentEl.value.trim();
    const nickname = commentNameEl.value.trim() || "Anonymous";
    const token = window.__ql_turnstile_token;

    if (!content) {
      commentStatusEl.textContent = "Please write a comment.";
      commentStatusEl.className = "ql-status-msg ql-error-text";
      return;
    }
    if (!token) {
      commentStatusEl.textContent = "Please complete the captcha.";
      commentStatusEl.className = "ql-status-msg ql-error-text";
      return;
    }

    commentSubmitBtn.disabled = true;
    commentStatusEl.textContent = "Submitting...";
    commentStatusEl.className = "ql-status-msg";

    try {
      const res = await fetch(`${SUPABASE_FUNCTIONS_URL}/comments-create`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ postSlug, nickname, content, captchaToken: token })
      });
      
      const data = await res.json();
      if (!res.ok || !data.ok) throw new Error(data.error || "Submission failed");
      
      commentStatusEl.textContent = "Comment submitted! It will appear after moderation.";
      commentStatusEl.className = "ql-status-msg ql-success-text";
      commentContentEl.value = "";
      
      // Optionally reload comments, though new one won't show until approved
    } catch (err) {
      console.error(err);
      commentStatusEl.textContent = err.message || "Failed to submit comment. Please try again.";
      commentStatusEl.className = "ql-status-msg ql-error-text";
    } finally {
      commentSubmitBtn.disabled = false;
    }
  });

  // Utility to escape HTML
  function escapeHtml(unsafe) {
    return unsafe
         .replace(/&/g, "&amp;")
         .replace(/</g, "&lt;")
         .replace(/>/g, "&gt;")
         .replace(/"/g, "&quot;")
         .replace(/'/g, "&#039;");
  }

  // Initial load
  loadComments();
});
</script>
